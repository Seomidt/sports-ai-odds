<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>Signal Terminal</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>
  </head>
  <body>
    <api-sports-widget
      id="apsw-config"
      data-type="config"
      data-key="local-proxy"
      data-sport="football"
      data-theme="SignalTerminal"
      data-lang="en"
      data-show-logos="true"
      data-timezone="Europe/Copenhagen"
    ></api-sports-widget>
    <script>
      document.getElementById("apsw-config").setAttribute(
        "data-url-football",
        location.origin + "/api/widget-proxy"
      );
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
